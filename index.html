<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lachfang – Lustige Karten aus der Schweiz</title>
  <meta name="description" content="Lachfang – freche, liebevoll gestaltete Karten aus der Schweiz.">
	<link rel="stylesheet" href="style.css">
</head>

<header class="header">
	<div class="container">
    <h1>Lachfang</h1>
    <div class="header-subtitle">e chli lustigi designs</div></div>
</header>


<body>
  <div class="container">

    <div class="section">
      <h2>tierliebi</h2>
      <div class="cards">
        <div class="card">
		  <img src="images/Animals/penguin.png" alt="LACHFANG Penguin">
          you had one job
        </div>
        <div class="card">
          <img src="images/Animals/kater.png" alt="LACHFANG Kater">
          heschn kater?
        </div>
        <div class="card">
          <img src="images/Animals/woodpecker.png" alt="LACHFANG Woodpecker">
          kukuuu
        </div>
		<div class="card">
          <img src="images/Animals/bear.png" alt="LACHFANG Bear">
          afänger
        </div>
		<div class="card">
          <img src="images/Animals/monkey.png" alt="LACHFANG Monkey">
          du aff
        </div>
		<div class="card">
          <img src="images/Animals/sheep.png" alt="LACHFANG Sheep">
          wolle
        </div>
      </div>
    </div>


    <div class="section">
      <h2>Kontakt</h2>
      <p>
        Interesse, Feedback oder Zusammenarbeit?<br>
        Schreib uns gerne:
        <span id="email"></span><br>
		<a href="https://www.instagram.com/lachfang/"
		   target="_blank"
		   rel="noopener"
		   style="display:inline-flex; align-items:center; gap:0.4rem;">

		  <!-- Instagram icon (inline SVG) -->
		  <svg xmlns="http://www.w3.org/2000/svg"
			   width="18" height="18" viewBox="0 0 24 24"
			   fill="none" stroke="currentColor" stroke-width="2"
			   stroke-linecap="round" stroke-linejoin="round"
			   aria-hidden="true">
			<rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
			<path d="M16 11.37A4 4 0 1 1 12.63 8
					 4 4 0 0 1 16 11.37z"></path>
			<line x1="17.5" y1="6.5" x2="17.5" y2="6.5"></line>
		  </svg>

		  <span>@lachfang</span>
		</a>

      </p>
    </div>

    <footer>
      © Lachfang · Schweiz
    </footer>
  </div>

  <!-- Email obfuscation (runs AFTER the element exists) -->
  <script>
    (function () {
      const user = "hello";
      const domain = "lachfang.ch";
      const el = document.getElementById("email");
      if (el) {
        el.innerHTML =
          '<a href="mailto:' + user + '@' + domain + '">' +
          user + '@' + domain +
          '</a>';
      }
    })();
  </script>
</body>
</html>
